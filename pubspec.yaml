name: bisign
description: BiSign - Giving Voice to the Voiceless. A real-time AI-powered bidirectional Indian Sign Language communication app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Media
  camera: ^0.10.5+9
  permission_handler: ^11.3.1

  # TensorFlow Lite - Sign classification
  tflite_flutter: ^0.10.4

  # Speech Output - Android TTS
  flutter_tts: ^4.0.2

  # Speech Recognition - Vosk (offline, ~50MB)
  vosk_flutter: ^0.3.5

  # JSON & Data handling
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # UI & Animation
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # Utilities
  logger: ^2.4.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/signs/
    - assets/images/
    - assets/models/
    - assets/vosk/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
